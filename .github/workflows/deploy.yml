name: Deploy Stockify to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2"

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /home/ubuntu/Stockify

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            cd Stockify-Backend
            npm install
            pm2 restart Backend || pm2 start server.js --name Backend

            echo "Installing frontend dependencies..."
            cd ../Stockify-Frontend
            npm install
            npm run build

            echo "Updating nginx build folder..."
            sudo rm -rf /var/www/stockify/*
            sudo cp -r dist/* /var/www/stockify/

            echo "Setting up Stoploss cron job..."
            cd ../AlgoTrading/stoploss-engine
            pm2 delete stoploss || true
            pm2 start stoploss.js --name stoploss --cron "15 9 * * 1-5" --no-autorestart

            echo "Setting up Intraday Squareoff cron job..."
            cd ..
            pm2 delete intraday-squareoff || true
            pm2 start intradaySquareOff.js --name intraday-squareoff --cron "15 15 * * 1-5" --no-autorestart

            echo "Reloading Nginx..."
            sudo systemctl reload nginx

            pm2 save

            echo "Deployment completed."