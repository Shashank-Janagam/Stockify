name: Deploy Stockify to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "Connected to EC2"

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /home/ubuntu/Stockify

            echo "Pulling latest code..."
            git pull origin main

            echo "Installing backend dependencies..."
            cd Stockify-Backend
            npm install

            echo "Installing frontend dependencies..."
            cd ../Stockify-Frontend
            npm install
            npm run build

            echo "Updating nginx build folder..."
            sudo rm -rf /var/www/stockify/*
            sudo cp -r dist/* /var/www/stockify/

            echo "Reloading backend..."
            pm2 reload Backend || pm2 restart Backend

            echo "Reloading stoploss..."
            cd ../AlgoTrading/stoploss-engine
            pm2 reload stoploss || pm2 restart stoploss

            cd ..
            pm2 reload intraday-squareoff || pm2 restart intraday-squareoff

            echo "Reloading Nginx..."
            sudo systemctl reload nginx
            pm2 save

            echo "Deployment completed."
