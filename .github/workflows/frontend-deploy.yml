name: Deploy Frontend to Azure Storage

on:
  push:
    paths:
      - 'Stockify-Frontend/**'
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-frontend:
    runs-on: ubuntu-latest


    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          cd Stockify-Frontend
          npm install

      - name: Build frontend
        run: |
          cd Stockify-Frontend
          npm run build

      - name: Upload to Azure Storage
        run: |
          az storage blob upload-batch \
            --account-name "${{ secrets.AZURE_STORAGE_ACCOUNT_NAME }}" \
            --account-key "${{ secrets.AZURE_STORAGE_ACCESS_KEY }}" \
            -d '$web' \
            -s "Stockify-Frontend/dist" \
            --overwrite
