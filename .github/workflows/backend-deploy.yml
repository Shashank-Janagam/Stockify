name: Deploy Backend to Azure VM

on:
  push:
    paths:
      - 'Stockify-Backend/**'
      - 'AlgoTrading/**'
      - 'NewsAnalysis/**'
    branches:
      - main

jobs:
  deploy-backend:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_VM_IP }}
          username: ${{ secrets.AZURE_VM_USER }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            echo "Connected to Azure VM"

            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd ~/Stockify

            echo "Pulling latest code..."
            git pull origin main

            ##################################################
            # Backend
            ##################################################
            echo "Installing backend dependencies..."
            cd Stockify-Backend
            npm install

            echo "Restarting Backend..."
            pm2 restart Backend || pm2 start server.js --name Backend

            ##################################################
            # Algo Trading
            ##################################################
            cd ../AlgoTrading

            npm install

            echo "Restarting Intraday Squareoff..."
            pm2 restart intraday-squareoff || pm2 start intradaySquareOff.js --name intraday-squareoff

            cd stoploss-engine

            echo "Restarting Stoploss..."
            pm2 restart stoploss || pm2 start stoploss.js --name stoploss

            ##################################################
            # News Analysis (Python)
            ##################################################
            cd ~/Stockify/NewsAnalysis

            # Create virtual environment if missing
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi

            source venv/bin/activate

            pip install --upgrade pip
            pip install -r requirements.txt

            echo "Restarting News Analysis..."
            pm2 restart news-analysis || pm2 start venv/bin/python --name news-analysis -- server.py

            deactivate

            ##################################################
            # Save PM2
            ##################################################
            pm2 save

            echo "Deployment completed successfully."