upstream backend {
    server backend:4000;
}

upstream news-analysis {
    server news-analysis:5001;
}

server {
    listen 80;
    server_name localhost;

    # Max upload size
    client_max_body_size 20M;

    # Let's Encrypt Certbot validation challenge path
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Python API Proxy
    location /pyapi/ {
        rewrite ^/pyapi/(.*)$ /$1 break;
        proxy_pass http://news-analysis;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Node Backend Proxy (including WebSockets)
    location /api/ {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Catch-all
    location / {
        return 200 'Stockify Nginx Proxy Running';
        add_header Content-Type text/plain;
    }
}
