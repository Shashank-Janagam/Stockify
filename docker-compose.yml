services:
  backend:
    build:
      context: ./Stockify-Backend
    container_name: stockify-backend
    ports:
      - "4000:4000"
    restart: unless-stopped
    env_file:
      - ./Stockify-Backend/.env
    environment:
      - PYTHON_SERVER_URL=http://news-analysis:5001/api/news
      - NODE_ENV=production

  news-analysis:
    build:
      context: ./NewsAnalysis
    container_name: news-analysis
    ports:
      - "5001:5001"
    restart: unless-stopped
    env_file:
      - ./Stockify-Backend/.env
    environment:
      - BACKEND_URL=http://backend:4000

  intraday-squareoff:
    build:
      context: ./AlgoTrading
    container_name: intraday-squareoff
    ports:
      - "4001:4001"
    restart: unless-stopped
    env_file:
      - ./AlgoTrading/.env

  stoploss-engine:
    build:
      context: ./AlgoTrading
      dockerfile: stoploss-engine/Dockerfile
    container_name: stoploss-engine
    restart: unless-stopped
    env_file:
      - ./AlgoTrading/.env

  pressrelease-cron:
    build:
      context: ./MultiAgent/PressRelease
    container_name: pressrelease-cron
    restart: unless-stopped
    env_file:
      - ./MultiAgent/PressRelease/.env

  upstox-backend:
    build:
      context: ./Upstox-Backend
    container_name: upstox-backend
    ports:
      - "4141:4141"
    restart: unless-stopped
    env_file:
      - ./Upstox-Backend/.env
