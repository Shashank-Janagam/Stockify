syntax = "proto3";

package com.upstox.marketdatafeeder.rpc.proto;

enum Type {
    initial_feed = 0;
    live_feed = 1;
}

message LTPC {
    double ltp = 1;
    int64 ltt = 2;
    int64 ltq = 3;
    double cp = 4;
}

message Feed {
    LTPC ltpc = 1;
}

message FeedResponse {
    Type type = 1;
    map<string, Feed> feeds = 2;
    int64 currentTs = 3;
}
